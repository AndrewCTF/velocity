# Production front-of-house: built web bundle via nginx + non-reload API. See README.

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    runtime: runc
    env_file:
      # Optional: the platform boots keyless. `cp .env.example .env` to add keys.
      - path: .env
        required: false
    environment:
      CORS_ORIGINS: http://localhost:8080
      # Archive profile: lift the retention clamp and size the replay store to
      # a disk budget instead of the default in-memory-sized byte cap, so the
      # osint_data volume below actually holds a multi-week history/AIS+ADS-B
      # archive instead of the bounded live buffer.
      ARCHIVE_MODE: 1
      HISTORY_DISK_BUDGET_GB: 5
    # No source bind-mount and no --reload: the image is the deployable unit.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      # Named volume (matching web_dist's style below) so the SQLite stores
      # (history/ontology/foundry/workflows/alert-rules) and tile cache under
      # WORKDIR /srv survive `docker compose down` and image rebuilds.
      - osint_data:/srv/data

  web-build:
    # One-shot builder: compiles the static web bundle into the shared web_dist
    # volume, then exits. nginx serves the produced files.
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    runtime: runc
    command: ["pnpm", "--filter", "@osint/web", "build"]
    volumes:
      - web_dist:/srv/apps/web/dist
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    runtime: runc
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - web-build

volumes:
  web_dist: {}
  osint_data: {}
