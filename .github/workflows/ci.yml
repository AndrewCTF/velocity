# CI gate — mirrors CLAUDE.md's commit-boundary requirements:
# `pnpm -r typecheck` green, api pytest green (≥25), plus lint on both stacks.
name: ci

on:
  push:
    branches: [master]
  pull_request:

# Least-privilege token: this workflow only builds, tests, and lints — it never
# writes to the repo. Pin contents:read so a compromised transitive dependency
# executing during install cannot use GITHUB_TOKEN against the repo.
permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r lint

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
