# Bundled region -> rough bounding-box lookup (spec §2 Stage B).
#
# Purpose: once Stage B ranks a region it needs SOME search box to hand
# Stage C (OSM/terrain retrieval). These are deliberately rough — country-
# level, and sometimes a hand-drawn composite like "S-Scandinavia" — good
# enough to seed a keyless Overpass/DEM query, not a survey boundary.
#
# Extensible: add a region key here, then reference the SAME key from
# knowledge/cues.yaml cue weights so Stage B's rule fuser can rank it. No
# region is hardcoded in geoprior.py — this file + cues.yaml are the only
# place country/region names appear.
#
# bbox = [west, south, east, north] in WGS84 degrees, matching
# contracts.GeoPrior.bbox exactly.

regions:
  Denmark:        [8.0, 54.5, 15.2, 57.8]
  S-Scandinavia:  [7.5, 54.5, 19.0, 61.5]   # DK + S Sweden + SE Norway coastal band — a hand-drawn composite, not an official region
