# nginx reverse proxy (production) — serves the pre-built static web bundle and
# proxies API/WS/tile traffic to the backend. The dev-server proxy in
# nginx.conf is replaced here by a static root + SPA fallback.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # The ADS-B snapshot is a multi-MB JSON body polled every second — gzip
  # cuts it ~10x. No-op when the api already sent Content-Encoding: gzip.
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types application/json application/geo+json text/plain text/css
             application/javascript image/svg+xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api {
    server api:8000;
  }

  server {
    listen 80;
    server_name _;

    # API
    location /api/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Basemap tile proxy
    location /tiles/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      add_header Cache-Control "public, max-age=86400";
    }

    # WebSockets — alerts, AIS bridge
    location /ws/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # Pre-built static web bundle (SPA). No dev server: serve files, and fall
    # back to index.html so client-side routes resolve.
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
    }
  }
}
