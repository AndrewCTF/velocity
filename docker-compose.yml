# ⚠️  DEV STACK ONLY — do NOT expose this to the internet.
# This runs uvicorn --reload (filesystem-watching auto-reloader) and the Vite
# dev server (HMR, no asset hardening) behind nginx. For a hardened front-of-
# house deployment use docker-compose.prod.yml (built static web bundle served
# by nginx + non-reload uvicorn, no source bind-mounts).
# Local dev infra — one `docker compose up` boots the whole platform.
# nginx is the only published port; everything else is on the internal network.
#
# NOTE: no database / redis services. Phase 1 keeps all state in-process
# (bounded in-memory observation store + disk tile cache). When the Phase 2
# TimescaleDB migration lands (plan §locked-decisions #5), re-add the
# `timescale/timescaledb-ha:pg16` + `redis:7-alpine` services alongside the
# sqlalchemy/asyncpg/redis dependencies.

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    runtime: runc
    env_file:
      # Optional: the platform boots keyless. `cp .env.example .env` to add keys.
      - path: .env
        required: false
    environment:
      CORS_ORIGINS: http://localhost:8080
    volumes:
      # bind-mount source so code changes hot-reload without rebuilding the image
      - ./apps/api/app:/srv/app
      - ./apps/api/tests:/srv/tests
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    runtime: runc
    environment:
      # Vite dev-server proxy target. Defaults to localhost:8000 for bare
      # `pnpm dev` outside docker; inside the compose network the API answers
      # on the service name.
      VITE_API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      # bind-mount source for HMR; node_modules stays inside the container
      - ./apps/web/src:/srv/apps/web/src
      - ./apps/web/index.html:/srv/apps/web/index.html
      - ./apps/web/vite.config.ts:/srv/apps/web/vite.config.ts
      - ./apps/web/eslint.config.js:/srv/apps/web/eslint.config.js
      - ./apps/web/tailwind.config.js:/srv/apps/web/tailwind.config.js
      - ./apps/web/postcss.config.js:/srv/apps/web/postcss.config.js
      - ./apps/web/tsconfig.json:/srv/apps/web/tsconfig.json
      - ./packages/shared/src:/srv/packages/shared/src
    command: ["pnpm", "--filter", "@osint/web", "dev", "--host", "0.0.0.0"]

  nginx:
    image: nginx:1.27-alpine
    runtime: runc
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
