# ⚠️  DEV STACK ONLY — do NOT expose this to the internet.
# This runs uvicorn --reload (filesystem-watching auto-reloader) and the Vite
# dev server (HMR, no asset hardening) behind nginx. For a hardened front-of-
# house deployment use docker-compose.prod.yml (built static web bundle served
# by nginx + non-reload uvicorn, no source bind-mounts).
# Local dev infra — one `docker compose up` boots the whole platform.
# nginx is the only published port; everything else is on the internal network.
#
# NOTE: no database / redis services. Phase 1 keeps all state in-process
# (bounded in-memory observation store + disk tile cache). When the Phase 2
# TimescaleDB migration lands (plan §locked-decisions #5), re-add the
# `timescale/timescaledb-ha:pg16` + `redis:7-alpine` services alongside the
# sqlalchemy/asyncpg/redis dependencies.

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    runtime: runc
    env_file:
      # Optional: the platform boots keyless. `cp .env.example .env` to add keys.
      - path: .env
        required: false
    environment:
      CORS_ORIGINS: http://localhost:8080
      # Make the README's 48h-retention claim true for a bare `docker compose
      # up` with no .env copied — the code default is 168h (7 days); 48h only
      # applies automatically if .env.example got copied to .env.
      HISTORY_RETENTION_HOURS: 48
      # Single-box DEV default: serve the compute/LLM endpoints on a keyless
      # boot instead of 503-ing them. Without this the advertised quickstart
      # hits dead Reports tabs and any LLM-backed feature. Safe here because
      # nginx publishes on 127.0.0.1 only (see the ports mapping below) and
      # the stack is explicitly "do NOT expose to the internet" (banner
      # above). A .env with API_KEY/Supabase makes this irrelevant (real
      # auth takes over). The UI shows an open-mode banner.
      # For a hardened deployment (docker-compose.prod.yml) leave it UNSET so
      # compute endpoints fail closed until a credential is configured.
      ALLOW_UNAUTHENTICATED: 1
    volumes:
      # bind-mount source so code changes hot-reload without rebuilding the image
      - ./apps/api/app:/srv/app
      - ./apps/api/tests:/srv/tests
      # Persist the SQLite stores (history/ontology/foundry/workflows/
      # alert-rules + the tile cache) across `docker compose down`. Named
      # volume, not a host bind: WORKDIR is /srv and the api image runs as
      # uid 10001 (`USER app`), but a host-owned `./data` dir isn't writable
      # by that uid. A named volume initializes owned by the image's
      # /srv/data mountpoint (api.Dockerfile mkdir+chown), so it stays
      # writable. The other bind mounts above are read-only source mounts;
      # this path is written at runtime, so it doesn't share their rationale.
      - osint_data_dev:/srv/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    runtime: runc
    environment:
      # Vite dev-server proxy target. Defaults to localhost:8000 for bare
      # `pnpm dev` outside docker; inside the compose network the API answers
      # on the service name.
      VITE_API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      # bind-mount source for HMR; node_modules stays inside the container
      - ./apps/web/src:/srv/apps/web/src
      - ./apps/web/index.html:/srv/apps/web/index.html
      - ./apps/web/vite.config.ts:/srv/apps/web/vite.config.ts
      - ./apps/web/eslint.config.js:/srv/apps/web/eslint.config.js
      - ./apps/web/tailwind.config.js:/srv/apps/web/tailwind.config.js
      - ./apps/web/postcss.config.js:/srv/apps/web/postcss.config.js
      - ./apps/web/tsconfig.json:/srv/apps/web/tsconfig.json
      - ./packages/shared/src:/srv/packages/shared/src
    command: ["pnpm", "--filter", "@osint/web", "dev", "--host", "0.0.0.0"]

  nginx:
    image: nginx:1.27-alpine
    runtime: runc
    ports:
      # Loopback only: this dev stack runs with ALLOW_UNAUTHENTICATED=1, so a
      # bare "8080:80" would hand open-mode compute routes (LLM, Workflows
      # dispatch) to the whole LAN. Override to "8080:80" deliberately — or
      # use docker-compose.prod.yml, which fails closed without a credential.
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  osint_data_dev: {}
