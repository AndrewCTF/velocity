# Local dev infra — one `docker compose up` boots the whole platform.
# nginx is the only published port; everything else is on the internal network.

services:
  db:
    # TimescaleDB HA image bundles PostGIS + Timescale on Postgres 16.
    image: timescale/timescaledb-ha:pg16
    runtime: runc
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osint}
      POSTGRES_DB: ${POSTGRES_DB:-osint}
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./infra/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    runtime: runc
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    runtime: runc
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-osint}:${POSTGRES_PASSWORD:-osint}@db:5432/${POSTGRES_DB:-osint}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080
    volumes:
      # bind-mount source so code changes hot-reload without rebuilding the image
      - ./apps/api/app:/srv/app
      - ./apps/api/tests:/srv/tests
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    runtime: runc
    depends_on:
      - api
    volumes:
      # bind-mount source for HMR; node_modules stays inside the container
      - ./apps/web/src:/srv/apps/web/src
      - ./apps/web/index.html:/srv/apps/web/index.html
      - ./apps/web/vite.config.ts:/srv/apps/web/vite.config.ts
      - ./apps/web/tailwind.config.js:/srv/apps/web/tailwind.config.js
      - ./apps/web/postcss.config.js:/srv/apps/web/postcss.config.js
      - ./apps/web/tsconfig.json:/srv/apps/web/tsconfig.json
      - ./packages/shared/src:/srv/packages/shared/src
    command: ["pnpm", "--filter", "@osint/web", "dev", "--host", "0.0.0.0"]

  nginx:
    image: nginx:1.27-alpine
    runtime: runc
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  dbdata:
