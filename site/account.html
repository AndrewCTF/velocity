<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account — Velocity</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#05070b; --bg1:#0a0e16; --bg2:#0f1724; --line:rgba(120,160,180,.16); --teal:#2dd4bf; --amber:#f59e0b; --ok:#4ade80; --txt:#e9f0f4; --mut:#66788a; }
      * { box-sizing:border-box; margin:0; }
      body { background:var(--bg); color:var(--txt); font-family:"Archivo",system-ui,sans-serif; min-height:100vh; padding:0 0 80px;
             background-image:radial-gradient(120% 60% at 50% -10%, rgba(45,212,191,.06), transparent 55%); }
      a { color:var(--teal); text-decoration:none; }
      .mono { font-family:"IBM Plex Mono",monospace; }
      .nav { display:flex; justify-content:space-between; align-items:center; padding:18px clamp(20px,5vw,48px); border-bottom:1px solid var(--line); }
      .brand { font-family:"Chakra Petch"; font-weight:700; letter-spacing:.22em; display:flex; gap:9px; align-items:center; }
      .mark { width:15px; height:15px; border:1.5px solid var(--teal); border-radius:50%; box-shadow:0 0 12px rgba(45,212,191,.5); position:relative; }
      .mark::after { content:""; position:absolute; inset:4px; border-radius:50%; background:var(--teal); }
      .signout { font-family:"IBM Plex Mono",monospace; font-size:13px; color:var(--mut); cursor:pointer; background:none; border:0; }
      .wrap { max-width:920px; margin:0 auto; padding:clamp(28px,5vw,52px) clamp(20px,5vw,32px); }
      h1 { font-family:"Chakra Petch"; font-size:clamp(28px,4vw,40px); margin-bottom:6px; }
      .email { color:var(--mut); font-family:"IBM Plex Mono",monospace; font-size:14px; margin-bottom:28px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
      .panel { background:var(--bg1); border:1px solid var(--line); border-radius:11px; padding:24px 26px; }
      .k { font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--mut); }
      .tier { font-family:"Chakra Petch"; font-size:30px; text-transform:capitalize; margin-top:6px; }
      .badge { display:inline-block; font-family:"IBM Plex Mono",monospace; font-size:11px; letter-spacing:.08em; padding:4px 10px; border-radius:999px; border:1px solid var(--line); margin-top:10px; }
      .badge.trialing { color:var(--amber); border-color:var(--amber); }
      .badge.active { color:var(--ok); border-color:var(--ok); }
      .badge.none, .badge.canceled { color:#ef4444; border-color:#ef4444; }
      ul { list-style:none; margin-top:8px; }
      li { font-family:"IBM Plex Mono",monospace; font-size:13.5px; color:#9db0bd; padding:7px 0; border-top:1px solid var(--line); display:flex; justify-content:space-between; }
      li b { color:var(--txt); }
      .cta { display:flex; gap:12px; flex-wrap:wrap; margin-top:26px; }
      .btn { font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:14px; padding:13px 22px; border-radius:6px; cursor:pointer; border:0; }
      .btn-p { background:var(--teal); color:var(--bg); }
      .btn-g { background:transparent; color:var(--txt); border:1px solid var(--line); }
      .paywall { background:linear-gradient(180deg, rgba(245,158,11,.08), var(--bg1)); border-color:var(--amber); }
      .loading, .note { font-family:"IBM Plex Mono",monospace; color:var(--mut); padding:60px 0; text-align:center; }
      .inp { font-family:"IBM Plex Mono",monospace; font-size:12px; background:var(--bg2); border:1px solid var(--line); border-radius:6px; padding:8px 10px; color:var(--txt); width:200px; max-width:48vw; }
      .inp:focus { outline:none; border-color:var(--teal); }
      .btn.small { padding:8px 12px; font-size:12px; }
      .kr { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line); }
      .kr:first-child { border-top:0; }
      .kr-r { display:flex; gap:8px; align-items:center; flex-shrink:0; }
      .tag { font-size:9px; letter-spacing:.06em; text-transform:uppercase; padding:2px 6px; border-radius:999px; border:1px solid var(--line); color:var(--mut); margin-left:6px; }
      .tag.active { color:var(--ok); border-color:rgba(74,222,128,.5); }
      .fld { display:flex; flex-direction:column; gap:4px; }
      .fld label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--mut); font-family:"IBM Plex Mono",monospace; }
      .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-top:8px; }
      .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
      .chip { font-family:"IBM Plex Mono",monospace; font-size:11px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; cursor:pointer; color:#9db0bd; user-select:none; }
      .chip input { display:none; }
      .chip.on { border-color:var(--teal); color:var(--teal); }
      @media (max-width:680px){ .row{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="nav">
      <a class="brand" href="/"><span class="mark"></span> VELOCITY</a>
      <button class="signout" id="signout">Sign out</button>
    </div>
    <div class="wrap" id="wrap"><p class="loading">Loading account…</p></div>

    <script>
      const tok = localStorage.getItem("vel_tok");
      if (!tok) location.href = "/login";
      const wrap = document.getElementById("wrap");
      document.getElementById("signout").onclick = () => { localStorage.removeItem("vel_tok"); location.href = "/login"; };

      const yn = (b) => (b ? "✓" : "—");
      const daysLeft = (iso) => iso ? Math.max(0, Math.ceil((new Date(iso) - new Date()) / 86400000)) : null;

      async function upgrade(tier) {
        const r = await fetch("/api/checkout", { method: "POST", headers: { authorization: `Bearer ${tok}`, "content-type": "application/json" }, body: JSON.stringify({ tier }) });
        const d = await r.json();
        if (d.url) location.href = d.url; else alert(d.error || "Checkout unavailable. Is billing configured?");
      }
      window.upgrade = upgrade;

      (async () => {
        let me;
        try {
          const r = await fetch("/api/me", { headers: { authorization: `Bearer ${tok}` } });
          if (r.status === 401) { localStorage.removeItem("vel_tok"); location.href = "/login"; return; }
          me = await r.json();
        } catch { wrap.innerHTML = '<p class="note">Gateway unreachable.</p>'; return; }

        const lim = me.limits || {};
        const active = me.tier && me.tier !== "none";
        const trialDays = me.status === "trialing" ? daysLeft(me.trial_ends_at) : null;
        const statusLine = me.status === "trialing" && trialDays != null ? `trial · ${trialDays} day${trialDays === 1 ? "" : "s"} left` : me.status;

        const entitlements = active ? `
          <div class="panel">
            <span class="k">Your plan includes</span>
            <ul>
              <li>Warm AOIs <b>${lim.warm_aois ?? "—"}</b></li>
              <li>Seats <b>${lim.seats ?? "—"}</b></li>
              <li>Agent API (MCP) <b>${yn(lim.agent)}</b></li>
              <li>Restricted feeds (BYOK) <b>${yn(lim.byok)}</b></li>
              <li>History &amp; replay <b>${yn(lim.history)}</b></li>
            </ul>
            <div class="cta">
              <a class="btn btn-p" href="/app">Open the console →</a>
              ${me.tier === "analyst" ? '<button class="btn btn-g" onclick="upgrade(\'team\')">Upgrade to Team</button>' : ""}
            </div>
          </div>` : `
          <div class="panel paywall">
            <span class="k">No active plan</span>
            <div class="tier" style="font-size:22px;margin-top:8px">Your trial has ended</div>
            <p style="color:#9db0bd;font-size:14px;margin:10px 0 4px">Pick a plan to keep your console, AOIs and agent access.</p>
            <div class="cta">
              <button class="btn btn-p" onclick="upgrade('analyst')">Analyst · $99/mo</button>
              <button class="btn btn-g" onclick="upgrade('team')">Team · $499/mo</button>
            </div>
          </div>`;

        wrap.innerHTML = `
          <h1>Account</h1>
          <p class="email">${me.email || ""}</p>
          <div class="row">
            <div class="panel">
              <span class="k">Current tier</span>
              <div class="tier">${me.tier}</div>
              <span class="badge ${me.status}">${statusLine}</span>
            </div>
            ${entitlements}
          </div>
          <div class="panel" style="margin-top:18px">
            <span class="k">Agent token — connect an MCP client</span>
            <p style="color:#9db0bd;font-size:13.5px;margin:10px 0 12px">Point any MCP client (Claude Code / Desktop, the Agent SDK) at <span class="mono">https://projectvelocity.org/mcp</span> with this token. It is your Velocity access token — treat it like a password; it refreshes when you sign in again.</p>
            <div class="mono" id="tokbox" style="background:var(--bg2);border:1px solid var(--line);border-radius:7px;padding:12px 14px;font-size:12.5px;word-break:break-all;color:#9db0bd"></div>
            <div class="cta">
              <button class="btn btn-p" id="copytok">Copy token</button>
              <button class="btn btn-g" id="copycmd">Copy connect command</button>
            </div>
          </div>
          <div class="panel" style="margin-top:18px">
            <span class="k">API keys — bring your own</span>
            <p style="color:#9db0bd;font-size:13.5px;margin:10px 0 14px">Stored Fernet-encrypted; only a last-4 hint is ever shown. <b>active</b> = used by a live layer, <b>stored</b> = saved (wiring in progress).</p>
            <div id="keysbox"><p class="mono" style="color:var(--mut)">loading…</p></div>
          </div>
          <div class="panel" style="margin-top:18px">
            <span class="k">Alerts — standing watches</span>
            <div id="alertsbox" style="margin-top:10px"><p class="mono" style="color:var(--mut)">loading…</p></div>
            <form id="alertform" style="margin-top:16px;border-top:1px solid var(--line);padding-top:16px">
              <div class="grid2">
                <div class="fld"><label>Label</label><input class="inp" name="label" required placeholder="Hormuz watch" style="width:100%"/></div>
                <div class="fld"><label>Lat</label><input class="inp" name="lat" type="number" step="any" required placeholder="26.5" style="width:100%"/></div>
                <div class="fld"><label>Lon</label><input class="inp" name="lon" type="number" step="any" required placeholder="56.3" style="width:100%"/></div>
                <div class="fld"><label>Radius (nm)</label><input class="inp" name="radius_nm" type="number" step="any" value="50" style="width:100%"/></div>
                <div class="fld"><label>Min severity</label><input class="inp" name="min_severity" type="number" min="1" max="5" value="2" style="width:100%"/></div>
                <div class="fld"><label>Channel</label><select class="inp" name="channel" style="width:100%"><option value="inapp">in-app</option><option value="email">email</option></select></div>
              </div>
              <div class="chips" id="kindchips"></div>
              <div class="cta" style="margin-top:14px"><button class="btn btn-p small" type="submit">Add alert</button></div>
            </form>
          </div>`;

        document.getElementById("tokbox").textContent =
          tok.length > 24 ? `${tok.slice(0, 14)}…${tok.slice(-6)}` : tok;
        const copy = (text, btn) => {
          const done = () => { const o = btn.textContent; btn.textContent = "Copied ✓"; setTimeout(() => (btn.textContent = o), 1500); };
          (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject()).then(done, () => window.prompt("Copy:", text));
        };
        const cmd = `claude mcp add --transport http velocity https://projectvelocity.org/mcp --header "Authorization: Bearer ${tok}"`;
        document.getElementById("copytok").onclick = () => copy(tok, document.getElementById("copytok"));
        document.getElementById("copycmd").onclick = () => copy(cmd, document.getElementById("copycmd"));

        // ── BYOK keys ───────────────────────────────────────────────────────
        const authHdr = { authorization: `Bearer ${tok}` };
        const jsonHdr = { ...authHdr, "content-type": "application/json" };

        async function renderKeys() {
          const box = document.getElementById("keysbox");
          let data;
          try {
            const r = await fetch("/api/keys", { headers: authHdr });
            if (!r.ok) { box.innerHTML = `<p class="mono" style="color:var(--amber)">Keys unavailable (${r.status}).${r.status === 502 ? " Run the user_keys migration." : ""}</p>`; return; }
            data = await r.json();
          } catch { box.innerHTML = '<p class="mono" style="color:var(--mut)">Gateway unreachable.</p>'; return; }
          const stored = Object.fromEntries((data.keys || []).map((k) => [k.provider, k]));
          box.innerHTML = (data.providers || []).map((p) => {
            const s = stored[p.id];
            const right = s
              ? `<span class="mono" style="color:#9db0bd">•••• ${s.hint}</span><button class="btn btn-g small" data-del="${p.id}">Remove</button>`
              : `<input class="inp" id="in-${p.id}" type="password" placeholder="paste key…" autocomplete="off"/><button class="btn btn-p small" data-set="${p.id}">Save</button>`;
            return `<div class="kr"><div><div class="mono" style="font-size:13px">${p.label}<span class="tag ${p.wired ? "active" : ""}">${p.wired ? "active" : "stored"}</span></div><div class="mono" style="font-size:11px;color:var(--mut)">${p.help}</div></div><div class="kr-r">${right}</div></div>`;
          }).join("");
          box.querySelectorAll("[data-set]").forEach((b) => b.onclick = async () => {
            const id = b.getAttribute("data-set");
            const val = document.getElementById("in-" + id).value.trim();
            if (!val) return;
            b.disabled = true;
            const r = await fetch("/api/keys/" + id, { method: "PUT", headers: jsonHdr, body: JSON.stringify({ value: val }) });
            if (!r.ok) { alert("Save failed (" + r.status + ")"); b.disabled = false; return; }
            renderKeys();
          });
          box.querySelectorAll("[data-del]").forEach((b) => b.onclick = async () => {
            b.disabled = true;
            await fetch("/api/keys/" + b.getAttribute("data-del"), { method: "DELETE", headers: authHdr });
            renderKeys();
          });
        }

        // ── alert rules ─────────────────────────────────────────────────────
        const KINDS = ["jamming", "dark_vessel", "military_air", "incident", "quake", "fire"];
        document.getElementById("kindchips").innerHTML = KINDS.map((k) => `<label class="chip"><input type="checkbox" value="${k}"/>${k.replace("_", " ")}</label>`).join("");
        document.querySelectorAll("#kindchips .chip input").forEach((cb) => cb.onchange = () => cb.parentElement.classList.toggle("on", cb.checked));

        async function renderAlerts() {
          const box = document.getElementById("alertsbox");
          let rules;
          try {
            const r = await fetch("/api/alerts/rules", { headers: authHdr });
            if (!r.ok) { box.innerHTML = `<p class="mono" style="color:var(--amber)">Alerts unavailable (${r.status}).${r.status === 502 ? " Run the alert_rules migration." : ""}</p>`; return; }
            rules = await r.json();
          } catch { box.innerHTML = '<p class="mono" style="color:var(--mut)">Gateway unreachable.</p>'; return; }
          box.innerHTML = rules.length
            ? rules.map((rl) => `<div class="kr"><div><div class="mono" style="font-size:13px">${rl.label}</div><div class="mono" style="font-size:11px;color:var(--mut)">${rl.lat.toFixed(2)}, ${rl.lon.toFixed(2)} · ${rl.radius_nm}nm · ${(rl.kinds || []).join(", ") || "all kinds"} · sev≥${rl.min_severity} · ${rl.channel}</div></div><div class="kr-r"><button class="btn btn-g small" data-delrule="${rl.id}">Delete</button></div></div>`).join("")
            : '<p class="mono" style="color:var(--mut);font-size:12px">No alert rules yet.</p>';
          box.querySelectorAll("[data-delrule]").forEach((b) => b.onclick = async () => {
            await fetch("/api/alerts/rules/" + b.getAttribute("data-delrule"), { method: "DELETE", headers: authHdr });
            renderAlerts();
          });
        }

        document.getElementById("alertform").onsubmit = async (e) => {
          e.preventDefault();
          const f = e.target;
          const kinds = [...document.querySelectorAll("#kindchips input:checked")].map((c) => c.value);
          const body = {
            label: f.label.value.trim(),
            lat: parseFloat(f.lat.value),
            lon: parseFloat(f.lon.value),
            radius_nm: parseFloat(f.radius_nm.value) || 50,
            min_severity: parseInt(f.min_severity.value, 10) || 1,
            channel: f.channel.value,
            kinds,
          };
          const r = await fetch("/api/alerts/rules", { method: "POST", headers: jsonHdr, body: JSON.stringify(body) });
          if (!r.ok) { alert("Could not add alert (" + r.status + ")"); return; }
          f.reset();
          document.querySelectorAll("#kindchips .chip").forEach((c) => c.classList.remove("on"));
          renderAlerts();
        };

        renderKeys();
        renderAlerts();
      })();
    </script>
  </body>
</html>
