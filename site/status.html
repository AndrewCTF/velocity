<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status — Velocity</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#05070b; --bg1:#0a0e16; --line:rgba(120,160,180,.16); --teal:#2dd4bf; --amber:#f59e0b; --ok:#4ade80; --bad:#ef4444; --txt:#e9f0f4; --mut:#66788a; }
      * { box-sizing:border-box; margin:0; }
      body { background:var(--bg); color:var(--txt); font-family:"Archivo",system-ui,sans-serif; min-height:100vh; padding:0 0 80px;
             background-image:radial-gradient(120% 60% at 50% -10%, rgba(45,212,191,.06), transparent 55%); }
      a { color:var(--teal); text-decoration:none; }
      .mono { font-family:"IBM Plex Mono",monospace; }
      .nav { display:flex; justify-content:space-between; align-items:center; padding:18px clamp(20px,5vw,48px); border-bottom:1px solid var(--line); }
      .brand { font-family:"Chakra Petch"; font-weight:700; letter-spacing:.22em; display:flex; gap:9px; align-items:center; }
      .mark { width:15px; height:15px; border:1.5px solid var(--teal); border-radius:50%; box-shadow:0 0 12px rgba(45,212,191,.5); position:relative; }
      .mark::after { content:""; position:absolute; inset:4px; border-radius:50%; background:var(--teal); }
      .wrap { max-width:760px; margin:0 auto; padding:clamp(28px,5vw,52px) clamp(20px,5vw,28px); }
      h1 { font-family:"Chakra Petch"; font-size:clamp(26px,4vw,38px); margin-bottom:4px; }
      .sub { color:var(--mut); font-family:"IBM Plex Mono",monospace; font-size:13.5px; margin-bottom:26px; }
      .overall { display:flex; align-items:center; gap:12px; background:var(--bg1); border:1px solid var(--line); border-radius:12px; padding:20px 24px; margin-bottom:20px; }
      .big { font-family:"Chakra Petch"; font-size:26px; text-transform:capitalize; }
      .hero-num { margin-left:auto; text-align:right; }
      .hero-num b { font-family:"Chakra Petch"; font-size:30px; color:var(--teal); }
      .hero-num span { display:block; font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:.1em; }
      .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; box-shadow:0 0 10px currentColor; }
      .green { background:var(--ok); color:var(--ok); }
      .amber { background:var(--amber); color:var(--amber); }
      .red { background:var(--bad); color:var(--bad); }
      .feed { display:flex; align-items:flex-start; gap:13px; background:var(--bg1); border:1px solid var(--line); border-radius:10px; padding:15px 18px; margin-bottom:10px; }
      .feed .body { flex:1; }
      .feed .name { font-family:"IBM Plex Mono",monospace; font-size:13.5px; }
      .feed .detail { font-family:"IBM Plex Mono",monospace; font-size:11.5px; color:var(--mut); margin-top:3px; line-height:1.5; }
      .feed .state { font-family:"IBM Plex Mono",monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; }
      .note { margin-top:22px; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--mut); line-height:1.6; border-top:1px solid var(--line); padding-top:18px; }
      .foot { margin-top:26px; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--mut); text-align:center; }
      .loading { font-family:"IBM Plex Mono",monospace; color:var(--mut); padding:60px 0; text-align:center; }
    </style>
  </head>
  <body>
    <div class="nav">
      <a class="brand" href="/"><span class="mark"></span> VELOCITY</a>
      <a class="mono" href="/app" style="font-size:13px">Open console →</a>
    </div>
    <div class="wrap" id="wrap"><p class="loading">Checking live status…</p></div>

    <script>
      const wrap = document.getElementById("wrap");
      const cls = (s) => (s === "green" ? "green" : s === "down" ? "red" : "amber");
      const overallCls = (s) => (s === "operational" ? "green" : s === "down" ? "red" : "amber");
      const ago = (s) => (s == null ? "—" : s < 90 ? `${Math.round(s)}s ago` : `${Math.round(s / 60)}m ago`);
      const esc = (t) => String(t).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

      (async () => {
        let d;
        try {
          const r = await fetch("/api/status", { cache: "no-store" });
          d = await r.json();
        } catch {
          wrap.innerHTML = '<p class="loading">Status endpoint unreachable.</p>';
          return;
        }
        const feeds = (d.feeds || []).map((f) => `
          <div class="feed">
            <span class="dot ${cls(f.status)}" style="margin-top:4px"></span>
            <div class="body">
              <div class="name">${esc(f.name)}</div>
              <div class="detail">${esc(f.detail || "")}</div>
            </div>
            <span class="state" style="color:var(--${f.status === "green" ? "ok" : f.status === "down" ? "bad" : "amber"})">${esc(f.status)}</span>
          </div>`).join("");

        wrap.innerHTML = `
          <h1>System status</h1>
          <p class="sub">Live from the running backend · build ${esc(d.build_id || "?")}</p>
          <div class="overall">
            <span class="dot ${overallCls(d.status)}"></span>
            <span class="big">${esc(d.status || "unknown")}</span>
            <div class="hero-num"><b>${(d.aircraft_count ?? 0).toLocaleString()}</b><span>aircraft live · ${ago(d.aircraft_age_s)}</span></div>
          </div>
          ${feeds}
          <p class="note">${esc(d.note || "")}</p>
          <p class="foot">Auto-refreshes every 30s · <a href="/">back to velocity</a></p>`;
      })();
      setInterval(() => location.reload(), 30000);
    </script>
  </body>
</html>
